<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyatomic Ions Matrix</title>
  <link rel="stylesheet" href="end-screen.css">
  <style>
    :root{--bg:#121212;--panel:#1a1a1a;--panel2:#202020;--line:#333;--text:#fff;--muted:#bbb;--accent:lightskyblue;--correct:lightgreen;--incorrect:orange}
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;text-align:center;margin:0}.hidden{display:none}
    h1{margin:12px 0 4px;font-size:clamp(26px,4vw,38px)}.subtitle{color:var(--muted);margin:0 auto 12px;max-width:980px;padding:0 16px;font-size:15px}
    .start-btn{font-size:24px;padding:12px 24px;margin-top:8px;cursor:pointer;border-radius:12px;border:2px solid #666;color:white;background:#333}.tiny-note{color:#9e9e9e;font-size:13px;margin-top:12px}
    #game-shell{width:min(1260px,98vw);margin:0 auto;padding:0 8px 16px}#tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin:8px auto}
    .tab-btn{background:#252525;color:white;border:1px solid #555;border-radius:999px;padding:7px 12px;font-size:14px;cursor:pointer}.tab-btn.active{background:var(--accent);color:#111;border-color:#9ad9ff;font-weight:bold}
    #groupBlurb{color:#d9d9d9;min-height:24px;margin:2px auto 8px;font-size:14px}#questionLabel{font-size:20px;margin:6px auto;min-height:24px}
    table{margin:0 auto;border-collapse:collapse;width:100%;table-layout:fixed;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
    th,td{border:1px solid var(--line);padding:2px 4px;font-size:14px;vertical-align:middle;height:80px;overflow:hidden}th{background:var(--panel2);font-size:12px;letter-spacing:.3px;text-transform:uppercase;color:#d8d8d8;height:80px;padding:2px 4px}
    td.name-cell{font-weight:bold;font-size:15px}td.formula-cell{font-size:20px;white-space:nowrap}td.charge-cell{font-size:18px;font-weight:bold;white-space:nowrap}td.structure-cell{padding:0}td.image-cell{font-size:30px}
    .missing{background:var(--accent);color:transparent!important}.missing .structure-wrap,.missing .mnemonic-wrap,.missing sup,.missing sub,.missing .emoji{visibility:hidden}
    .structure-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:56px;overflow:visible}.structure-svg{width:min(150px,100%);height:54px;display:block;overflow:visible}.choices-label{font-size:14px;color:var(--muted);margin:8px 0}
    #choices{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px;width:min(980px,94vw);margin:0 auto}.choice-button{background:#222;color:white;border:2px solid #555;border-radius:14px;font-size:18px;padding:10px 12px;min-height:78px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center}.choice-button:hover{background:#2f2f2f;transform:translateY(-1px)}.choice-button.correct{background:var(--correct);color:black;border-color:green}.choice-button.incorrect{background:var(--incorrect);color:black;border-color:#b85a00}
    .formula-choice{font-size:30px;line-height:1}.charge-choice{font-size:32px;line-height:1}.name-choice{font-size:23px;font-weight:bold;text-transform:lowercase}.mnemonic-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;line-height:1}.emoji{font-size:31px;line-height:1}.mnemonic-label{font-size:12px;color:#ddd}#feedback{font-size:24px;color:lightgreen;margin-top:12px;min-height:28px}
    @media(max-height:850px){th,td{height:50px;font-size:12px;padding:1px 3px}td.name-cell{font-size:13px}td.formula-cell{font-size:17px}td.charge-cell{font-size:15px}td.image-cell{font-size:24px}.structure-wrap{height:48px}.structure-svg{width:min(130px,100%);height:46px}.choice-button{min-height:66px}.formula-choice{font-size:25px}}
    @media(max-width:900px){#choices{grid-template-columns:repeat(2,minmax(160px,1fr))}th,td{padding:1px 2px;font-size:11px}td.name-cell{font-size:12px}td.formula-cell{font-size:15px}td.charge-cell{font-size:14px}td.image-cell{font-size:22px}.structure-svg{width:min(115px,100%);height:42px}.tab-btn{font-size:12px;padding:6px 9px}}
  </style>
</head>
<body>
  <div id="start-screen"><h1>Polyatomic Ions</h1><p class="subtitle">Learn the ion atlas in small memory chunks. Pick a tab, study its mini-chart, then restore the missing cell.</p><button class="start-btn" onclick="startGame()">Start</button><div class="tiny-note">10 questions • tabbed groups • no image assets needed • simplified structure sketches</div></div>
  <div id="game-screen" class="hidden"><div id="game-shell"><h1>Polyatomic Ions</h1><div id="tabs"></div><div id="groupBlurb"></div><div id="questionLabel"></div><div id="question-area"></div><div class="choices-label" id="choicesLabel">Choose the missing cell:</div><div id="choices"></div><div id="feedback"></div></div></div>
  <div id="turn-in-screen" class="hidden"><h2>Nice!</h2><p id="summary-again"></p><p>Enter your initials:</p><div id="initials-boxes"><input class="initial-box" id="initial-0" maxlength="1" type="text"/><input class="initial-box" id="initial-1" maxlength="1" type="text"/><input class="initial-box" id="initial-2" maxlength="1" type="text"/></div><textarea id="student-comments" placeholder="Comments (optional)"></textarea><button class="submit-btn" onclick="handleSubmission()">Send to Chuck</button><p id="submit-status"></p><button id="play-again-btn" onclick="location.reload()">Play Again</button></div>
  <script src="end-screen.js"></script>
  <script>
    const groups=[{id:"aquarium",title:"Aquarium",blurb:"Fish waste story: ammonia/ammonium → nitrite → nitrate, with nitrate managed by plants and water changes.",ionIds:["ammonium","nitrite","nitrate","hydroxide"]},{id:"ate-ite",title:"-ate / -ite",blurb:"The -ite ion usually has one fewer oxygen than its -ate partner, with the same charge.",ionIds:["nitrate","nitrite","sulfate","sulfite"]},{id:"earth-life",title:"Earth & Life",blurb:"Shells, bones, baking soda, and vinegar: the ions that feel tangible in daily life.",ionIds:["carbonate","bicarbonate","phosphate","acetate"]},{id:"color-lab",title:"Color Lab",blurb:"Big colorful lab ions: purple permanganate, yellow chromate, and orange dichromate.",ionIds:["permanganate","chromate","dichromate","cyanide"]},{id:"full",title:"Full List",blurb:"The full starter list in one place for review and mixed practice.",ionIds:["nitrate","nitrite","sulfate","sulfite","carbonate","bicarbonate","phosphate","hydroxide","acetate","ammonium","cyanide","permanganate","chromate","dichromate"]}];
    const ions=[{id:"ammonium",name:"ammonium",formulaPlain:"NH4+",formulaHTML:"NH<sub>4</sub><sup>+</sup>",charge:"+1",mnemonicEmoji:"🧴",mnemonicLabel:"cleaner",structureType:"ammonium"},{id:"hydroxide",name:"hydroxide",formulaPlain:"OH-",formulaHTML:"OH<sup>-</sup>",charge:"-1",mnemonicEmoji:"🧼",mnemonicLabel:"base",structureType:"hydroxide"},{id:"nitrate",name:"nitrate",formulaPlain:"NO3-",formulaHTML:"NO<sub>3</sub><sup>-</sup>",charge:"-1",mnemonicEmoji:"🌱",mnemonicLabel:"fertilizer",structureType:"nitrate"},{id:"nitrite",name:"nitrite",formulaPlain:"NO2-",formulaHTML:"NO<sub>2</sub><sup>-</sup>",charge:"-1",mnemonicEmoji:"🐟",mnemonicLabel:"aquarium",structureType:"nitrite"},{id:"sulfate",name:"sulfate",formulaPlain:"SO4 2-",formulaHTML:"SO<sub>4</sub><sup>2-</sup>",charge:"-2",mnemonicEmoji:"🧱",mnemonicLabel:"gypsum",structureType:"sulfate"},{id:"sulfite",name:"sulfite",formulaPlain:"SO3 2-",formulaHTML:"SO<sub>3</sub><sup>2-</sup>",charge:"-2",mnemonicEmoji:"🍷",mnemonicLabel:"preservative",structureType:"sulfite"},{id:"carbonate",name:"carbonate",formulaPlain:"CO3 2-",formulaHTML:"CO<sub>3</sub><sup>2-</sup>",charge:"-2",mnemonicEmoji:"🐚",mnemonicLabel:"shell",structureType:"carbonate"},{id:"bicarbonate",name:"bicarbonate",formulaPlain:"HCO3-",formulaHTML:"HCO<sub>3</sub><sup>-</sup>",charge:"-1",mnemonicEmoji:"🍞",mnemonicLabel:"baking soda",structureType:"bicarbonate"},{id:"phosphate",name:"phosphate",formulaPlain:"PO4 3-",formulaHTML:"PO<sub>4</sub><sup>3-</sup>",charge:"-3",mnemonicEmoji:"🦴",mnemonicLabel:"bones",structureType:"phosphate"},{id:"acetate",name:"acetate",formulaPlain:"C2H3O2-",formulaHTML:"C<sub>2</sub>H<sub>3</sub>O<sub>2</sub><sup>-</sup>",charge:"-1",mnemonicEmoji:"🥗",mnemonicLabel:"vinegar",structureType:"acetate"},{id:"cyanide",name:"cyanide",formulaPlain:"CN-",formulaHTML:"CN<sup>-</sup>",charge:"-1",mnemonicEmoji:"☠️",mnemonicLabel:"poison",structureType:"cyanide"},{id:"permanganate",name:"permanganate",formulaPlain:"MnO4-",formulaHTML:"MnO<sub>4</sub><sup>-</sup>",charge:"-1",mnemonicEmoji:"🟣",mnemonicLabel:"purple",structureType:"permanganate"},{id:"chromate",name:"chromate",formulaPlain:"CrO4 2-",formulaHTML:"CrO<sub>4</sub><sup>2-</sup>",charge:"-2",mnemonicEmoji:"🟡",mnemonicLabel:"yellow",structureType:"chromate"},{id:"dichromate",name:"dichromate",formulaPlain:"Cr2O7 2-",formulaHTML:"Cr<sub>2</sub>O<sub>7</sub><sup>2-</sup>",charge:"-2",mnemonicEmoji:"🟠",mnemonicLabel:"orange",structureType:"dichromate"}];
    const ionById=Object.fromEntries(ions.map(ion=>[ion.id,ion])),testableColumns=["name","formula","charge","structure","mnemonic"],chargeOptions=["+1","-1","-2","-3"];let activeGroupId="aquarium",totalQuestions=10,questionsAnswered=0,correctAnswers=0,currentMissing={};
    function startGame(){window.startTime=Date.now();document.getElementById("start-screen").classList.add("hidden");document.getElementById("game-screen").classList.remove("hidden");buildTabs();nextQuestion();}
    function buildTabs(){const tabs=document.getElementById("tabs");tabs.innerHTML="";groups.forEach(group=>{const btn=document.createElement("button");btn.className="tab-btn"+(group.id===activeGroupId?" active":"");btn.textContent=group.title;btn.onclick=()=>{activeGroupId=group.id;buildTabs();nextQuestion()};tabs.appendChild(btn);});}
    function getActiveGroup(){return groups.find(group=>group.id===activeGroupId)||groups[0];}function getActiveIons(){return getActiveGroup().ionIds.map(id=>ionById[id]).filter(Boolean);}
    function nextQuestion(){document.getElementById("feedback").textContent="";document.getElementById("choices").innerHTML="";const activeGroup=getActiveGroup(),visibleIons=getActiveIons(),rowIndex=Math.floor(Math.random()*visibleIons.length),colKey=testableColumns[Math.floor(Math.random()*testableColumns.length)],ion=visibleIons[rowIndex],correctValue=getColumnValue(ion,colKey);currentMissing={rowIndex,colKey,correctValue};document.getElementById("groupBlurb").textContent=activeGroup.blurb;document.getElementById("questionLabel").innerHTML=`Question ${questionsAnswered+1} of ${totalQuestions}`;document.getElementById("question-area").innerHTML=generateTable(visibleIons,rowIndex,colKey);document.getElementById("choicesLabel").textContent=`Choose the missing ${columnDisplayName(colKey)}:`;generateOptions(correctValue,colKey,visibleIons).forEach(opt=>{const btn=document.createElement("button");btn.className="choice-button";btn.dataset.answer=opt;btn.innerHTML=renderChoice(opt,colKey);btn.onclick=()=>handleAnswer(btn,opt);document.getElementById("choices").appendChild(btn);});}
    function columnDisplayName(key){return{name:"name",formula:"formula",charge:"charge",structure:"structure diagram",mnemonic:"association"}[key]||key;}function getColumnValue(ion,colKey){if(colKey==="formula")return ion.formulaPlain;if(colKey==="structure")return ion.structureType;if(colKey==="mnemonic")return ion.id;return ion[colKey];}
    function generateTable(visibleIons,missingRow,missingCol){let html=`<table><tr><th style="width:18%">Name</th><th style="width:18%">Formula</th><th style="width:10%">Charge</th><th style="width:34%">Structure Diagram</th><th style="width:20%">Association</th></tr>`;visibleIons.forEach((ion,i)=>{html+="<tr>";html+=cell(i===missingRow&&missingCol==="name",ion.name,"name-cell");html+=cell(i===missingRow&&missingCol==="formula",ion.formulaHTML,"formula-cell");html+=cell(i===missingRow&&missingCol==="charge",ion.charge,"charge-cell");html+=cell(i===missingRow&&missingCol==="structure",`<div class="structure-wrap">${getStructureSVG(ion.structureType)}</div>`,"structure-cell");html+=cell(i===missingRow&&missingCol==="mnemonic",mnemonic(ion),"image-cell");html+="</tr>";});return html+"</table>";}function cell(isMissing,html,className){return`<td class="${className} ${isMissing?"missing":""}">${html}</td>`;}function mnemonic(ion){return`<div class="mnemonic-wrap"><div class="emoji">${ion.mnemonicEmoji}</div><div class="mnemonic-label">${ion.mnemonicLabel}</div></div>`;}
    function generateOptions(correct,key,visibleIons){let pool;if(key==="charge")pool=chargeOptions.filter(v=>v!==correct);else if(key==="structure"||key==="mnemonic")pool=ions.map(ion=>getColumnValue(ion,key)).filter(v=>v!==correct);else{const local=visibleIons.map(ion=>getColumnValue(ion,key)).filter(v=>v!==correct),full=ions.map(ion=>getColumnValue(ion,key)).filter(v=>v!==correct&&!local.includes(v));pool=[...local,...shuffleArray(full)];}return shuffleArray([correct,...shuffleArray(pool).slice(0,3)]);}function renderChoice(value,key){if(key==="name")return`<div class="name-choice">${value}</div>`;if(key==="formula"){const ion=ions.find(i=>i.formulaPlain===value);return`<div class="formula-choice">${ion?ion.formulaHTML:value}</div>`;}if(key==="charge")return`<div class="charge-choice">${value}</div>`;if(key==="structure")return`<div class="structure-wrap">${getStructureSVG(value)}</div>`;if(key==="mnemonic"){const ion=ions.find(i=>i.id===value);return ion?mnemonic(ion):value;}return value;}
    function handleAnswer(btn,answer){const buttons=document.querySelectorAll(".choice-button");buttons.forEach(b=>b.disabled=true);if(answer===currentMissing.correctValue){btn.classList.add("correct");correctAnswers++;document.getElementById("feedback").textContent="Correct!";}else{btn.classList.add("incorrect");document.getElementById("feedback").textContent="";buttons.forEach(b=>{if(b.dataset.answer===currentMissing.correctValue)b.classList.add("correct");});}questionsAnswered++;if(questionsAnswered>=totalQuestions)setTimeout(endGame,1500);else setTimeout(nextQuestion,1500);}function endGame(){document.getElementById("game-screen").classList.add("hidden");document.getElementById("turn-in-screen").classList.remove("hidden");document.getElementById("summary-again").textContent=`You got ${correctAnswers} out of ${totalQuestions} correct.`;document.getElementById("initial-0").focus();const elapsedMs=Date.now()-window.startTime,seconds=Math.floor((elapsedMs/1000)%60),minutes=Math.floor((elapsedMs/1000)/60);window.elapsedStr=`${minutes}m${seconds}s`;}function handleSubmission(){submitResults({game:"polyatomic_ions_matrix_tabbed",settings:`${getActiveGroup().title}, 10 questions`,score:`${correctAnswers}`,elapsed:window.elapsedStr||"unknown",initials:"",comments:""});}function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    function getStructureSVG(type){switch(type){case"hydroxide":return svgAtoms([[26,29,"O"],[94,29,"H"]],[[38,29,82,29]]);case"cyanide":return svgAtoms([[38,29,"C"],[86,29,"N"]],[[50,27,74,27],[50,31,74,31]]);case"ammonium":return svgAtoms([[64,29,"N"],[64,8,"H"],[64,50,"H"],[30,29,"H"],[98,29,"H"]],[[64,20,64,12],[64,38,64,46],[42,29,52,29],[76,29,88,29]]);case"nitrate":return svgAtoms([[64,29,"N"],[64,8,"O"],[30,45,"O"],[98,45,"O"]],[[64,20,64,14],[56,34,40,41],[72,34,88,41]]);case"nitrite":return svgAtoms([[64,29,"N"],[34,29,"O"],[94,29,"O"]],[[46,29,52,29],[76,29,82,29]]);case"sulfate":return svgAtoms([[64,29,"S"],[64,8,"O"],[64,50,"O"],[30,29,"O"],[98,29,"O"]],[[64,20,64,14],[64,38,64,44],[42,29,52,29],[76,29,88,29]]);case"sulfite":return svgAtoms([[64,29,"S"],[64,8,"O"],[34,45,"O"],[94,45,"O"]],[[64,20,64,14],[56,34,42,41],[72,34,86,41]]);case"carbonate":return svgAtoms([[64,29,"C"],[64,8,"O"],[34,45,"O"],[94,45,"O"]],[[64,20,64,14],[56,34,42,41],[72,34,86,41]]);case"bicarbonate":return svgAtoms([[58,29,"C"],[24,29,"O"],[92,29,"O"],[58,8,"O"],[116,29,"H"]],[[36,29,48,29],[68,29,82,29],[58,20,58,14],[104,29,110,29]]);case"phosphate":return svgAtoms([[64,29,"P"],[64,8,"O"],[64,50,"O"],[30,29,"O"],[98,29,"O"]],[[64,20,64,14],[64,38,64,44],[42,29,52,29],[76,29,88,29]]);case"permanganate":return svgAtoms([[64,29,"Mn"],[64,8,"O"],[64,50,"O"],[30,29,"O"],[98,29,"O"]],[[64,20,64,14],[64,38,64,44],[42,29,52,29],[76,29,88,29]]);case"chromate":return svgAtoms([[64,29,"Cr"],[64,8,"O"],[64,50,"O"],[30,29,"O"],[98,29,"O"]],[[64,20,64,14],[64,38,64,44],[42,29,52,29],[76,29,88,29]]);case"dichromate":return svgTextStructure("O₃Cr—O—CrO₃");case"acetate":return svgTextStructure("CH₃—C—O—O");default:return svgTextStructure(type);}}
    function svgAtoms(atomList,bondList){const lines=bondList.map(([x1,y1,x2,y2])=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#cfd8dc" stroke-width="2.4" stroke-linecap="round"/>`).join("");const atoms=atomList.map(([x,y,label])=>`<circle cx="${x}" cy="${y}" r="12" fill="#2a2a2a" stroke="#88c9ff" stroke-width="1.5"></circle><text x="${x}" y="${y+4}" text-anchor="middle" font-size="10.5" fill="#fff" font-family="Arial">${label}</text>`).join("");return`<svg class="structure-svg" viewBox="0 0 136 58" xmlns="http://www.w3.org/2000/svg">${lines}${atoms}</svg>`;}function svgTextStructure(label){return`<svg class="structure-svg" viewBox="0 0 136 58" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="6" width="122" height="46" rx="9" ry="9" fill="#1f1f1f" stroke="#88c9ff" stroke-width="1.5"></rect><text x="64" y="35" text-anchor="middle" font-size="15" fill="#fff" font-family="Arial">${label}</text></svg>`;}
  </script>
</body>
</html>
